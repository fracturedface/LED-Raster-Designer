name: Release Build

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v0.6.2.5

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.6.3.0)"
        required: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Run tests first - fail fast before building
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r src/requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # macOS Build
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r src/requirements.txt
          pip install pyinstaller rumps

      - name: Build app
        run: |
          source .venv/bin/activate
          cd src && python -m PyInstaller led_raster_designer.spec --noconfirm
          cp -R "dist/LED Raster Designer.app" "../LED Raster Designer.app"

      - name: Smoke test frozen app
        run: |
          # Launch the actual frozen binary in server-only mode and probe it.
          # Validates the bundle end-to-end: entry point, blueprints, datas.
          export LRD_NO_WINDOW=1 LRD_SMOKE_PORT=18750
          "./LED Raster Designer.app/Contents/MacOS/LED Raster Designer" &
          APP_PID=$!
          for i in $(seq 1 30); do
            sleep 1
            if curl -sf http://127.0.0.1:18750/api/version > /dev/null; then break; fi
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "frozen app exited early"; exit 1
            fi
          done
          curl -sf http://127.0.0.1:18750/api/version
          curl -sf -o /dev/null -w "GUI: %{http_code}\n" http://127.0.0.1:18750/
          curl -sf http://127.0.0.1:18750/api/project > /dev/null && echo "project API: ok"
          curl -sf http://127.0.0.1:18750/api/panel-catalog/info > /dev/null && echo "catalog API: ok"
          kill $APP_PID

      # ── Code Signing (requires Apple Developer cert in secrets) ──
      - name: Import code signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

      - name: Sign app bundle
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements /dev/null \
            "LED Raster Designer.app"

      - name: Notarize app
        if: env.MACOS_NOTARIZE_APPLE_ID != ''
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: |
          # Create ZIP for notarization
          ditto -c -k --keepParent "LED Raster Designer.app" "LRD-notarize.zip"
          xcrun notarytool submit "LRD-notarize.zip" \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --password "$MACOS_NOTARIZE_PASSWORD" \
            --team-id "$MACOS_NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple "LED Raster Designer.app"

      - name: Create release DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          DMG="led_raster_designer_v${VERSION}_macos.dmg"
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install create-dmg
          # The DMG window is 600x400 points. Finder does NOT scale a plain
          # background image, so it must match the window size (a 1200x800 PNG
          # would show only its top-left quarter). For Retina crispness we fold
          # the 600x400 (1x) and 1200x800 (2x) PNGs into a single hi-dpi TIFF
          # via tiffutil; if that fails we fall back to the 1x PNG, which is
          # already the correct on-screen size.
          BG="build/dmg-background.png"
          if tiffutil -cathidpicheck build/dmg-background.png build/dmg-background@2x.png -out build/dmg-background.tiff; then
            BG="build/dmg-background.tiff"
          fi
          echo "Using DMG background: $BG"
          # create-dmg can exit non-zero on CI when the Finder AppleScript
          # styling step is flaky, yet still produce a valid DMG — so we retry
          # and finally accept any DMG that exists.
          for attempt in 1 2 3; do
            rm -f "$DMG"
            create-dmg \
              --volname "LED Raster Designer" \
              --background "$BG" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 120 \
              --icon "LED Raster Designer.app" 150 210 \
              --app-drop-link 450 210 \
              --hide-extension "LED Raster Designer.app" \
              --no-internet-enable \
              "$DMG" \
              "LED Raster Designer.app" && break
            echo "create-dmg attempt $attempt returned non-zero; checking for output..."
            [ -f "$DMG" ] && { echo "DMG produced despite warning."; break; }
            sleep 5
          done
          test -f "$DMG"
          # If the app was notarized above, notarize + staple the DMG too so it
          # passes Gatekeeper on first open. Skipped when no notarize secrets.
          if [ -n "${{ secrets.MACOS_NOTARIZE_APPLE_ID }}" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "${{ secrets.MACOS_NOTARIZE_APPLE_ID }}" \
              --password "${{ secrets.MACOS_NOTARIZE_PASSWORD }}" \
              --team-id "${{ secrets.MACOS_NOTARIZE_TEAM_ID }}" \
              --wait || echo "DMG notarization failed (app inside is already notarized)."
            xcrun stapler staple "$DMG" || echo "DMG staple skipped."
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: led_raster_designer_v*_macos.dmg

  # ──────────────────────────────────────────────
  # Windows Build
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\Activate.ps1
          pip install -r src/requirements.txt
          pip install pyinstaller pystray

      - name: Build executable
        run: |
          .venv\Scripts\Activate.ps1
          cd src
          python -m PyInstaller led_raster_designer.spec --noconfirm
          Copy-Item -Recurse -Force "dist\LED Raster Designer" "..\LED Raster Designer App"

      - name: Smoke test frozen app
        run: |
          # Launch the actual frozen binary in server-only mode and probe it.
          # Validates the bundle end-to-end: entry point, blueprints, datas.
          $env:LRD_NO_WINDOW = "1"
          $env:LRD_SMOKE_PORT = "18750"
          $proc = Start-Process -FilePath "LED Raster Designer App\LED Raster Designer.exe" -PassThru
          $ok = $false
          foreach ($i in 1..30) {
            Start-Sleep -Seconds 1
            try {
              $resp = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18750/api/version" -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            if ($proc.HasExited) { Write-Error "frozen app exited early"; exit 1 }
          }
          if (-not $ok) { Write-Error "server never came up"; Stop-Process -Id $proc.Id -Force; exit 1 }
          Write-Host "version: $((Invoke-WebRequest -UseBasicParsing -Uri 'http://127.0.0.1:18750/api/version').Content)"
          $gui = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18750/"
          Write-Host "GUI: $($gui.StatusCode)"
          Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18750/api/project" | Out-Null; Write-Host "project API: ok"
          Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:18750/api/panel-catalog/info" | Out-Null; Write-Host "catalog API: ok"
          Stop-Process -Id $proc.Id -Force

      # ── Code Signing (requires certificate in secrets) ──
      - name: Sign executable
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $cert = [System.Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE")
          [System.IO.File]::WriteAllBytes("certificate.pfx", $cert)
          & 'C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe' sign `
            /f certificate.pfx `
            /p "$env:WINDOWS_CERTIFICATE_PWD" `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /fd sha256 `
            "LED Raster Designer App\LED Raster Designer.exe"
          Remove-Item certificate.pfx

      - name: Create release ZIP
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if (-not $version -or $version -eq "${{ github.ref_name }}") {
            $version = "${{ github.event.inputs.version }}"
          }
          Compress-Archive -Path "LED Raster Designer App" `
            -DestinationPath "led_raster_designer_v${version}_windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: led_raster_designer_v*_windows.zip

  # ──────────────────────────────────────────────
  # Create GitHub Release & Upload Assets
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum macos-build/*.dmg windows-build/*.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "LED Raster Designer ${{ github.ref_name }}"
          # Auto-publish on tag push so the README "Download latest" link
          # and the in-app sidebar link always resolve to the just-built
          # release. Previously this was draft:true and required manual
          # publish, which led to releases piling up as drafts and the
          # /releases/latest page pointing at an old version.
          draft: false
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/macos-build/*.dmg
            artifacts/windows-build/*.zip
            artifacts/checksums.txt

